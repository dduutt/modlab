name: Build Windows App

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails App
        run: wails build -platform windows/amd64

      - name: Prepare Release Asset
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
            $releaseTag = $env:GITHUB_REF_NAME
            $releaseTitle = "Modlab $version"
            $isPrerelease = "false"
          } else {
            $version = "latest"
            $releaseTag = "latest"
            $releaseTitle = "Modlab Latest Windows Build"
            $isPrerelease = "true"
          }
          $assetName = "modlab-windows-amd64-$version.exe"
          New-Item -ItemType Directory -Force dist-release | Out-Null
          Copy-Item build/bin/modlab.exe "dist-release/$assetName"
          "ASSET_NAME=$assetName" >> $env:GITHUB_ENV
          "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          "RELEASE_TITLE=$releaseTitle" >> $env:GITHUB_ENV
          "IS_PRERELEASE=$isPrerelease" >> $env:GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: dist-release/*.exe
          if-no-files-found: error

      - name: Move Latest Tag
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest $env:GITHUB_SHA
          git push origin latest --force

      - name: Publish Release Asset
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = (Get-ChildItem dist-release/*.exe | Select-Object -First 1).FullName
          $notes = if ($env:IS_PRERELEASE -eq "true") {
            "Automated Windows build from commit $env:GITHUB_SHA."
          } else {
            "Windows release build for $env:RELEASE_TAG."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $asset --clobber
          } elseif ($env:IS_PRERELEASE -eq "true") {
            gh release create $env:RELEASE_TAG $asset --title $env:RELEASE_TITLE --notes $notes --prerelease --target $env:GITHUB_SHA
          } else {
            gh release create $env:RELEASE_TAG $asset --title $env:RELEASE_TITLE --notes $notes --latest
          }
